<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>吉立森精密機械有限公司</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
 /* 導覽列樣式 */
 .top-nav {
 background-color: #0F4C81;
 padding: 12px 20px;
 display: flex;
 justify-content: space-between;
 align-items: center;
 }
 .logo-text {
 color: white;
 font-size: 18px;
 font-weight: bold;
 margin: 0;
 }
 .nav-buttons .btn {
 margin-left: 10px;
 }

 /* 主橫幅 */
 .hero-banner {
 background: linear-gradient(90deg, #0F4C81 0%, #1A73E8 100%);
 color: white;
 padding: 60px 20px;
 text-align: center;
 }
 .hero-banner h1 {
 font-size: 36px;
 font-weight: bold;
 margin-bottom: 15px;
 }
 .hero-banner .subtitle {
 font-size: 18px;
 margin-bottom: 30px;
 opacity: 0.9;
 }
 .btn-yellow {
 background-color: #FFC107;
 color: black;
 font-weight: bold;
 padding: 12px 30px;
 border-radius: 6px;
 text-decoration: none;
 }

 /* 服務卡 */
 .service-section {
 padding: 40px 20px;
 }
 .service-card {
 text-align: center;
 padding: 25px;
 border: 1px solid #eee;
 border-radius: 6px;
 margin-bottom: 20px;
 }
 .service-card .title {
 font-size: 18px;
 font-weight: bold;
 margin-bottom: 8px;
 }
 .service-card .desc {
 font-size: 14px;
 color: #666;
 }

 /* 流程部分 */
 .process-section {
 padding: 40px 20px;
 text-align: center;
 background-color: #f8f9fa;
 }
 .process-section h5 {
 margin-bottom: 15px;
 }
 .process-steps {
 color: #0d6efd;
 font-weight: 500;
 }

 /* 頁尾 */
 footer {
 padding: 20px;
 text-align: center;
 background-color: #f8f9fa;
 color: #666;
 font-size: 14px;
 }
</style>
</head>
<body>
<!-- 頂部導覽列 -->
<div class="top-nav">
 <!-- 這裡就是你紅圈的位置，已經改成你要的文字 -->
 <p class="logo-text">吉立森精密機械有限公司</p>
 <div class="nav-buttons">
 <button class="btn btn-light">我要加工</button>
 <button class="btn btn-outline-light">工廠進駐</button>
 </div>
</div>

<!-- 主橫幅 -->
<div class="hero-banner">
 <h1>精密零件・線上加工</h1>
 <p class="subtitle">CNC | 數控車 | 五軸 | 鋁件不銹鋼</p>
 <a href="#" class="btn-yellow">立即發單</a>
</div>

<!-- 服務卡 -->
<div class="container service-section">
 <div class="row">
 <div class="col-md-3">
 <div class="service-card">
 <div class="title">CNC加工</div>
 <div class="desc">3/4/5軸</div>
 </div>
 </div>
 <div class="col-md-3">
 <div class="service-card">
 <div class="title">CNC車</div>
 <div class="desc">走心機/車銑</div>
 </div>
 </div>
 <div class="col-md-3">
 <div class="service-card">
 <div class="title">表面處理</div>
 <div class="desc">氧化/噴砂/電鍍</div>
 </div>
 </div>
 <div class="col-md-3">
 <div class="service-card">
 <div class="title">擔保交易</div>
 <div class="desc">驗收再付款</div>
 </div>
 </div>
 </div>
</div>

<!-- 加工流程 -->
<div class="process-section">
 <h5>加工流程</h5>
 <div class="process-steps">發單 → 報價 → 付款 → 生產 → 交付</div>
</div>

<!-- 頁尾 -->
<footer>
 &copy; 2026 CNC機械加工接單平台
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
