<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>發布加工需求</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>body{background:#f5f7fa;font-family:Microsoft YaHei}</style>
</head>
<body class="py-4">
<div class="container">
 <div class="card shadow border-0 p-3 mx-auto" style="max-width:500px">
 <h5 class="text-center mb-3">CNC加工需求單</h5>
 <form>
 <div class="mb-2"><label>零件名稱</label><input class="form-control form-sm"></div>
 <div class="mb-2"><label>材質</label><select class="form-select">
 <option>AL6061</option><option>AL7075</option><option>45#鋼</option><option>SUS304</option><option>POM</option></select></div>
 <div class="mb-2"><label>數量</label><input type="number" class="form-control"></div>
 <div class="mb-2"><label>公差</label><input class="form-control" placeholder="±0.01mm"></div>
 <div class="mb-2"><label>表面處理</label><select class="form-select">
 <option>無</option><option>陽極氧化</option><option>噴砂</option><option>發黑</option></select></div>
 <div class="mb-2"><label>交期</label><input type="date" class="form-control"></div>
 <div class="mb-2"><label>上傳圖</label><input type="file" multiple class="form-control"></div>
 <div class="mb-2"><label>備註</label><textarea class="form-control" rows="2"></textarea></div>
 <button class="btn btn-primary w-100 mt-2">提交需求</button>
 </form>
 </div>
</div>
</body>
</html>
