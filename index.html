<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CNC機械加工接單平台</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
 body { font-family: "Microsoft YaHei", sans-serif; }
 .navbar { background-color: #0F4C81!important; }
 .hero {
 background: linear-gradient(to right, #0F4C81, #1565C0);
 color: #fff;
 padding: 60px 0;
 }
 .card-hover { transition: transform 0.3s; }
 .card-hover:hover { transform: translateY(-5px); }
 .footer { background: #f8f9fa; padding: 30px 0; margin-top: 50px; }
</style>
</head>
<body>

<!-- 導航 -->
<nav class="navbar navbar-expand-lg navbar-dark px-3">
 <div class="container">
 <a class="navbar-brand fw-bold">CNC精密加工</a>
 <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
 <span class="navbar-toggler-icon"></span>
 </button>
 <div class="collapse navbar-collapse" id="nav">
 <div class="ms-auto mt-2 mt-lg-0">
 <a href="publish.html" class="btn btn-light text-primary me-2">我要加工</a>
 <a href="factory.html" class="btn btn-outline-light">工廠進駐</a>
 </div>
 </div>
 </div>
</nav>

<!-- 首屏 -->
<section class="hero text-center py-5">
 <div class="container">
 <h1 class="fw-bold mb-3">精密零件 · 線上加工</h1>
 <p class="lead mb-4">CNC | 數控車 | 五軸 | 鋁件不鏽鋼</p>
 <a href="publish.html" class="btn btn-warning btn-lg px-5">立即發單</a>
 </div>
</section>

<!-- 服務 -->
<div class="container py-4">
 <div class="row g-3">
 <div class="col-6 col-md-3">
 <div class="card card-hover text-center p-3 h-100 shadow-sm border-0">
 <h5>CNC加工</h5>
 <p class="small text-muted">3/4/5軸</p>
 </div>
 </div>
 <div class="col-6 col-md-3">
 <div class="card card-hover text-center p-3 h-100 shadow-sm border-0">
 <h5>CNC車</h5>
 <p class="small text-muted">走心機/車銑</p>
 </div>
 </div>
 <div class="col-6 col-md-3">
 <div class="card card-hover text-center p-3 h-100 shadow-sm border-0">
 <h5>表面處理</h5>
 <p class="small text-muted">氧化/噴砂/電鍍</p>
 </div>
 </div>
 <div class="col-6 col-md-3">
 <div class="card card-hover text-center p-3 h-100 shadow-sm border-0">
 <h5>擔保交易</h5>
 <p class="small text-muted">驗收再付款</p>
 </div>
 </div>
 </div>
</div>

<!-- 流程 -->
<section class="bg-light py-5">
 <div class="container text-center">
 <h5 class="mb-3">加工流程</h5>
 <div class="d-flex flex-wrap justify-content-center small fw-bold text-primary">
 <span class="px-2">發單</span>
 <span class="px-2">→</span>
 <span class="px-2">報價</span>
 <span class="px-2">→</span>
 <span class="px-2">付款</span>
 <span class="px-2">→</span>
 <span class="px-2">生產</span>
 <span class="px-2">→</span>
 <span class="px-2">交付</span>
 </div>
 </div>
</section>

<footer class="footer text-center">
 <p class="text-muted small">© 2026 CNC機械加工接單平台</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
